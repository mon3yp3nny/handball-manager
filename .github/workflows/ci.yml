name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend Tests (pytest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run tests
        working-directory: backend
        run: pytest --tb=short -q

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run API tests
        working-directory: frontend
        run: npx playwright test --project=api --reporter=github
        env:
          API_BASE_URL: ${{ vars.API_BASE_URL || 'https://handball-backend-218596927281.europe-west1.run.app' }}
          APP_BASE_URL: ${{ vars.APP_BASE_URL || 'https://handball-frontend-218596927281.europe-west1.run.app' }}

      - name: Run UI tests
        working-directory: frontend
        run: npx playwright test --project=ui --reporter=github
        env:
          API_BASE_URL: ${{ vars.API_BASE_URL || 'https://handball-backend-218596927281.europe-west1.run.app' }}
          APP_BASE_URL: ${{ vars.APP_BASE_URL || 'https://handball-frontend-218596927281.europe-west1.run.app' }}

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14
